---
on:
  workflow_call:
    inputs:
      team_id:
        required: true
        type: string
      team_name:
        required: true
        type: string
      activity_name:
        required: true
        type: string
      telegram_chat_id:
        required: true
        type: string

jobs:
  falcon-formation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Set up python.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip.
        run: >
          python -m pip install --upgrade pip

      - name: Install package locally.
        run: >
          pip install .

      - name: Decrypt team data.
        run: >
          openssl enc -d -aes-256-cbc
          -in data/team.json.enc
          -out data/team.json
          -pass pass:${{ secrets.TEAM_ENCRYPTION_KEY }}
          -pbkdf2

      - name: Run falcon formation.
        env:
          TEAM_ID: ${{ inputs.team_id }}
          TEAM_NAME: ${{ inputs.team_name }}
          HOLDSPORT_USERNAME: ${{ secrets.holdsport_username }}
          HOLDSPORT_PASSWORD: ${{ secrets.holdsport_password }}
        run: |
          {
            echo 'MESSAGE<<EOF'
            falcon-formation
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Save message as file.
        run: |
            cat <<EOF > falcon-formation.txt
            ${{ env.MESSAGE }}
            EOF

      - name: Save message file as artifact.
        uses: actions/upload-artifact@v4
        with:
          name: falcon-formation
          path: falcon-formation.txt
          retention-days: 5

      - name: Send telegram message.
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.telegram_chat_id }}
          token: ${{ secrets.telegram_token }}
          message: ${{ env.MESSAGE }}
